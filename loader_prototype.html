<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dimensional Breach Prototype</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
  background: #030001; 
  overflow: hidden; 
  font-family: 'Courier New', monospace;
  cursor: none;
}
#canvas-container {
  position: fixed;
  inset: 0;
  z-index: 1;
}
#ui-layer {
  position: fixed;
  inset: 0;
  z-index: 10;
  pointer-events: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
#logo-container {
  position: relative;
  width: 140px;
  height: 140px;
  margin-bottom: 60px;
}
#logo-svg {
  width: 100%;
  height: 100%;
  filter: drop-shadow(0 0 20px rgba(255, 0, 51, 0.6));
}
.logo-ring {
  position: absolute;
  inset: -20px;
  border: 1px solid rgba(255, 0, 51, 0.3);
  border-radius: 50%;
  border-top-color: rgba(255, 0, 51, 0.9);
  border-right-color: transparent;
  animation: spin 4s linear infinite;
}
.logo-ring:nth-child(2) {
  inset: -35px;
  border-width: 0.5px;
  border-top-color: transparent;
  border-bottom-color: rgba(255, 0, 51, 0.5);
  animation: spin-reverse 6s linear infinite;
}
.logo-ring:nth-child(3) {
  inset: -50px;
  border-width: 0.3px;
  border-left-color: rgba(255, 0, 51, 0.4);
  border-right-color: transparent;
  animation: spin 8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes spin-reverse { to { transform: rotate(-360deg); } }

#progress-container {
  width: 320px;
  position: relative;
}
#progress-label {
  display: flex;
  justify-content: space-between;
  margin-bottom: 8px;
  font-size: 9px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: rgba(255, 0, 51, 0.7);
}
#progress-bar {
  height: 1px;
  background: rgba(255, 0, 51, 0.15);
  position: relative;
  overflow: hidden;
}
#progress-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #ff0033, #ff3366);
  box-shadow: 0 0 10px rgba(255, 0, 51, 0.8), 0 0 30px rgba(255, 0, 51, 0.3);
  transition: width 0.1s linear;
  position: relative;
}
#progress-fill::after {
  content: '';
  position: absolute;
  right: 0;
  top: -2px;
  width: 4px;
  height: 5px;
  background: #fff;
  box-shadow: 0 0 10px #fff, 0 0 20px #ff0033;
}
#terminal {
  position: absolute;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 10px;
  color: rgba(255, 0, 51, 0.5);
  letter-spacing: 0.15em;
  text-align: center;
  min-height: 20px;
}
#big-counter {
  position: fixed;
  bottom: 40px;
  left: 40px;
  font-size: 80px;
  font-weight: 900;
  color: rgba(255, 0, 51, 0.15);
  letter-spacing: -0.05em;
  line-height: 1;
  font-family: 'Courier New', monospace;
}
#big-counter span {
  display: inline-block;
  transition: all 0.1s;
}
.cursor-dot {
  position: fixed;
  width: 3px;
  height: 3px;
  background: #ff0033;
  border-radius: 50%;
  pointer-events: none;
  z-index: 1000;
  box-shadow: 0 0 6px #ff0033;
  transition: transform 0.05s;
}
.cursor-ring {
  position: fixed;
  width: 24px;
  height: 24px;
  border: 1px solid rgba(255, 0, 51, 0.4);
  border-radius: 50%;
  pointer-events: none;
  z-index: 999;
  transition: transform 0.15s ease-out;
}
.tear-overlay {
  position: fixed;
  inset: 0;
  z-index: 100;
  pointer-events: none;
  opacity: 0;
}
#breach-flash {
  position: fixed;
  inset: 0;
  background: #fff;
  z-index: 200;
  opacity: 0;
  pointer-events: none;
}
</style>
</head>
<body>

<div id="canvas-container">
  <canvas id="matrix"></canvas>
</div>

<div id="ui-layer">
  <div id="logo-container">
    <div class="logo-ring"></div>
    <div class="logo-ring"></div>
    <div class="logo-ring"></div>
    <svg id="logo-svg" viewBox="0 0 100 100" fill="none">
      <defs>
        <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#ff0033"/>
          <stop offset="50%" style="stop-color:#ff3366"/>
          <stop offset="100%" style="stop-color:#660011"/>
        </linearGradient>
        <filter id="glow">
          <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
          <feMerge>
            <feMergeNode in="coloredBlur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>
      <!-- P shape constructed from paths -->
      <path d="M28 18 h28 c16 0 24 10 24 22 c0 14 -10 22 -26 22 h-18 v30 h-16 v-74 h8" 
            stroke="url(#logoGrad)" stroke-width="3.5" fill="none" filter="url(#glow)"
            stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M28 34 h20 c8 0 12 4 12 10 c0 7 -5 10 -14 10 h-18 v-20" 
            stroke="url(#logoGrad)" stroke-width="3" fill="none" opacity="0.6"/>
      <!-- Inner glow core -->
      <circle cx="42" cy="40" r="3" fill="#ff0033" opacity="0.8">
        <animate attributeName="opacity" values="0.4;0.9;0.4" dur="2s" repeatCount="indefinite"/>
      </circle>
    </svg>
  </div>

  <div id="progress-container">
    <div id="progress-label">
      <span id="status-text">ESTABLISHING UPLINK</span>
      <span id="percent-text">0%</span>
    </div>
    <div id="progress-bar">
      <div id="progress-fill"></div>
    </div>
  </div>

  <div id="terminal"></div>
</div>

<div id="big-counter">
  <span id="c1">0</span><span id="c2">0</span><span id="c3">0</span>
</div>

<div class="cursor-dot" id="cursor-dot"></div>
<div class="cursor-ring" id="cursor-ring"></div>

<div id="breach-flash"></div>
<canvas id="tear-canvas" class="tear-overlay"></canvas>

<script>
// ============================================
// DIMENSIONAL BREACH LOADER PROTOTYPE
// ============================================

const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');
const tearCanvas = document.getElementById('tear-canvas');
const tearCtx = tearCanvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = tearCanvas.width = window.innerWidth;
  H = canvas.height = tearCanvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Mouse tracking
const mouse = { x: -1000, y: -1000, active: false };
const mouseSmooth = { x: -1000, y: -1000 };
window.addEventListener('mousemove', e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  mouse.active = true;
  document.getElementById('cursor-dot').style.transform = `translate(${e.clientX-1.5}px, ${e.clientY-1.5}px)`;
});

// Custom cursor follow
let ringX = -100, ringY = -100;
function updateRing() {
  ringX += (mouse.x - ringX) * 0.12;
  ringY += (mouse.y - ringY) * 0.12;
  document.getElementById('cursor-ring').style.transform = `translate(${ringX-12}px, ${ringY-12}px)`;
  requestAnimationFrame(updateRing);
}
updateRing();

// ============================================
// MATRIX RAIN SYSTEM (Micro-fine)
// ============================================

const CHARS = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789ABCDEF░▒▓█◢◣◤◥▪▫◊○●◐◑∴∵∷∞∝∫∮∯∰∱∲∳';

class MicroDrop {
  constructor(layer) {
    this.layer = layer; // 0=back, 1=mid, 2=front
    this.reset(true);
  }

  reset(randomY = false) {
    this.x = Math.random() * W;
    this.y = randomY ? Math.random() * H : -20;

    // Layer-based properties
    const configs = [
      { font: 7, speed: 0.4, opacity: 0.06, glow: false, chars: 4 },
      { font: 10, speed: 0.9, opacity: 0.12, glow: false, chars: 7 },
      { font: 13, speed: 1.6, opacity: 0.28, glow: true, chars: 10 }
    ];
    const cfg = configs[this.layer];
    this.fontSize = cfg.font + Math.random() * 3;
    this.baseSpeed = cfg.speed * (0.7 + Math.random() * 0.6);
    this.baseOpacity = cfg.opacity;
    this.canGlow = cfg.glow;
    this.charCount = cfg.chars;
    this.chars = [];
    for (let i = 0; i < this.charCount; i++) {
      this.chars.push({
        char: CHARS[Math.floor(Math.random() * CHARS.length)],
        switchTimer: Math.random() * 30
      });
    }
    this.phase = Math.random() * Math.PI * 2;
  }

  update(dt, time) {
    // Mouse influence - large radius
    const dx = this.x - mouseSmooth.x;
    const dy = this.y - mouseSmooth.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const mouseRadius = 220;

    let speed = this.baseSpeed;
    let opacity = this.baseOpacity;

    if (dist < mouseRadius && mouse.active) {
      const influence = 1 - (dist / mouseRadius);
      // Slow down near mouse
      speed *= (1 - influence * 0.7);
      // Brighten
      opacity = Math.min(1, opacity + influence * 0.6);
      // Slight magnetic pull
      this.x -= (dx / dist) * influence * 0.3;
    }

    // Breathing opacity
    const breathe = Math.sin(time * 2 + this.phase) * 0.3 + 0.7;
    opacity *= breathe;

    this.y += speed * (dt * 60);

    // Character glitch switching
    for (let c of this.chars) {
      c.switchTimer -= dt * 60;
      if (c.switchTimer <= 0) {
        c.char = CHARS[Math.floor(Math.random() * CHARS.length)];
        c.switchTimer = 5 + Math.random() * 25;
      }
    }

    if (this.y > H + 20) {
      this.reset();
    }

    return { opacity, dist, mouseRadius };
  }

  draw(ctx, time, mouseData) {
    const { opacity, dist, mouseRadius } = mouseData;

    for (let i = 0; i < this.chars.length; i++) {
      const cy = this.y - i * this.fontSize * 1.1;
      if (cy < -10 || cy > H + 10) continue;

      // Leading character is brightest
      const charOpacity = i === 0 ? opacity : opacity * (1 - i / this.chars.length) * 0.7;

      // Color temperature: front = hot white-red, back = deep crimson
      let r, g, b;
      if (this.layer === 2 && i === 0) {
        r = 255; g = 200 + Math.sin(time * 3) * 55; b = 200 + Math.sin(time * 3) * 55;
      } else if (this.layer === 2) {
        r = 255; g = 30; b = 50;
      } else if (this.layer === 1) {
        r = 180; g = 10; b = 25;
      } else {
        r = 80; g = 0; b = 8;
      }

      // Mouse proximity = white-hot
      if (dist < mouseRadius * 0.5 && mouse.active) {
        const h = 1 - dist / (mouseRadius * 0.5);
        r = 255;
        g = Math.min(255, g + h * 200);
        b = Math.min(255, b + h * 200);
      }

      ctx.fillStyle = `rgba(${r|0}, ${g|0}, ${b|0}, ${charOpacity})`;
      ctx.font = `${this.fontSize}px monospace`;
      ctx.fillText(this.chars[i].char, this.x, cy);
    }
  }
}

// Create drops: many small ones
const drops = [];
for (let i = 0; i < 300; i++) drops.push(new MicroDrop(0));
for (let i = 0; i < 150; i++) drops.push(new MicroDrop(1));
for (let i = 0; i < 50; i++) drops.push(new MicroDrop(2));

// ============================================
// PROGRESS & STATE MACHINE
// ============================================

let progress = 0;
let phase = 'loading'; // loading -> converging -> tearing -> breached
let phaseTimer = 0;
const terminal = document.getElementById('terminal');
const statusText = document.getElementById('status-text');
const percentText = document.getElementById('percent-text');
const progressFill = document.getElementById('progress-fill');

const LOGS = [
  { t: 5, text: '>> NEURAL LINK ESTABLISHED' },
  { t: 18, text: '>> QUANTUM ENTANGLEMENT DETECTED' },
  { t: 32, text: '>> DIMENSIONAL BARRIER: UNSTABLE' },
  { t: 48, text: '>> SPACETIME FABRIC: TEARING' },
  { t: 65, text: '>> BREACH IMMINENT - SEEK SHELTER' },
  { t: 82, text: '>> REALITY ANCHOR: LOST' },
  { t: 95, text: '>> ENTERING THE VOID...' },
];

let shownLogs = new Set();

function updateCounter() {
  const p = Math.min(100, Math.floor(progress));
  const s = p.toString().padStart(3, '0');
  document.getElementById('c1').textContent = s[0];
  document.getElementById('c2').textContent = s[1];
  document.getElementById('c3').textContent = s[2];
}

// ============================================
// DIMENSIONAL TEAR SYSTEM (The Breach)
// ============================================

class DimensionalTear {
  constructor() {
    this.active = false;
    this.crackPoints = [];
    this.debris = [];
    this.lightning = [];
    this.time = 0;
    this.phase = 'forming'; // forming -> widening -> collapsing -> done
    this.centerX = W / 2;
    this.centerY = H / 2;
    this.maxRadius = Math.max(W, H) * 0.8;
  }

  generateCrack() {
    // Organic, jagged crack path using noise-like function
    this.crackPoints = [];
    const segments = 80;
    const baseAngle = -Math.PI / 2; // Start from top

    for (let i = 0; i <= segments; i++) {
      const t = i / segments;
      const angle = baseAngle + t * Math.PI * 2;

      // Jagged radius with multiple frequencies
      const r1 = Math.sin(t * 13) * 15;
      const r2 = Math.sin(t * 7 + 1) * 10;
      const r3 = Math.sin(t * 23 + 2) * 5;
      const baseR = 2 + t * 3;
      const radius = baseR + r1 + r2 + r3;

      this.crackPoints.push({
        x: this.centerX + Math.cos(angle) * radius,
        y: this.centerY + Math.sin(angle) * radius,
        angle,
        baseRadius: radius,
        noise: Math.random()
      });
    }

    // Generate debris
    for (let i = 0; i < 200; i++) {
      const angle = Math.random() * Math.PI * 2;
      const dist = Math.random() * 100;
      this.debris.push({
        x: this.centerX + Math.cos(angle) * dist,
        y: this.centerY + Math.sin(angle) * dist,
        vx: Math.cos(angle) * (2 + Math.random() * 4),
        vy: Math.sin(angle) * (2 + Math.random() * 4),
        size: 1 + Math.random() * 3,
        life: 1,
        decay: 0.005 + Math.random() * 0.01,
        angle: Math.random() * Math.PI * 2,
        spin: (Math.random() - 0.5) * 0.2
      });
    }
  }

  start() {
    this.active = true;
    this.phase = 'forming';
    this.time = 0;
    this.generateCrack();
    document.querySelector('.tear-overlay').style.opacity = '1';
  }

  update(dt) {
    if (!this.active) return;
    this.time += dt;

    // Phase transitions
    if (this.phase === 'forming' && this.time > 0.3) this.phase = 'widening';
    if (this.phase === 'widening' && this.time > 1.2) this.phase = 'collapsing';
    if (this.phase === 'collapsing' && this.time > 2.0) {
      this.phase = 'done';
      this.active = false;
      // Flash white
      const flash = document.getElementById('breach-flash');
      flash.style.transition = 'opacity 0.1s';
      flash.style.opacity = '1';
      setTimeout(() => {
        flash.style.transition = 'opacity 1.5s ease-out';
        flash.style.opacity = '0';
      }, 100);
      // Hide loader UI
      document.getElementById('ui-layer').style.transition = 'opacity 0.5s';
      document.getElementById('ui-layer').style.opacity = '0';
      document.getElementById('big-counter').style.transition = 'opacity 0.5s';
      document.getElementById('big-counter').style.opacity = '0';
    }

    // Update debris
    for (let d of this.debris) {
      d.x += d.vx;
      d.y += d.vy;
      d.vx *= 0.98;
      d.vy *= 0.98;
      d.life -= d.decay;
      d.angle += d.spin;
    }
    this.debris = this.debris.filter(d => d.life > 0);

    // Generate lightning branches during forming
    if (this.phase === 'forming' && Math.random() < 0.3) {
      const idx = Math.floor(Math.random() * this.crackPoints.length);
      const p = this.crackPoints[idx];
      this.lightning.push({
        x: p.x, y: p.y,
        segments: [],
        life: 0.3,
        maxLife: 0.3
      });
      // Build jagged line
      let lx = p.x, ly = p.y;
      const lAngle = p.angle + (Math.random() - 0.5) * 1;
      for (let s = 0; s < 5; s++) {
        lx += Math.cos(lAngle + (Math.random()-0.5)) * (10 + Math.random() * 20);
        ly += Math.sin(lAngle + (Math.random()-0.5)) * (10 + Math.random() * 20);
        this.lightning[this.lightning.length-1].segments.push({x: lx, y: ly});
      }
    }

    for (let l of this.lightning) l.life -= dt;
    this.lightning = this.lightning.filter(l => l.life > 0);
  }

  draw(ctx) {
    if (!this.active) return;

    const t = this.time;

    // Calculate expansion based on phase
    let expansion = 0;
    if (this.phase === 'forming') expansion = t / 0.3 * 5;
    else if (this.phase === 'widening') expansion = 5 + (t - 0.3) / 0.9 * 400;
    else if (this.phase === 'collapsing') expansion = 405 + (t - 1.2) / 0.8 * 600;

    ctx.save();

    // Draw the void (black hole)
    const voidGradient = ctx.createRadialGradient(
      this.centerX, this.centerY, 0,
      this.centerX, this.centerY, expansion * 1.5
    );
    voidGradient.addColorStop(0, '#000000');
    voidGradient.addColorStop(0.3, '#000000');
    voidGradient.addColorStop(0.5, 'rgba(255,0,51,0.1)');
    voidGradient.addColorStop(0.7, 'rgba(255,0,51,0.3)');
    voidGradient.addColorStop(0.85, 'rgba(255,50,80,0.15)');
    voidGradient.addColorStop(1, 'transparent');

    ctx.fillStyle = voidGradient;
    ctx.beginPath();
    ctx.arc(this.centerX, this.centerY, expansion * 2, 0, Math.PI * 2);
    ctx.fill();

    // Draw crack edges with glow
    if (this.crackPoints.length > 1) {
      // Outer hot glow
      ctx.shadowColor = '#ff0033';
      ctx.shadowBlur = 20;
      ctx.strokeStyle = 'rgba(255, 0, 51, 0.8)';
      ctx.lineWidth = 3;
      ctx.beginPath();
      for (let i = 0; i < this.crackPoints.length; i++) {
        const p = this.crackPoints[i];
        const r = p.baseRadius + expansion + Math.sin(t * 10 + i) * 3;
        const x = this.centerX + Math.cos(p.angle) * r;
        const y = this.centerY + Math.sin(p.angle) * r;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.stroke();

      // Inner white-hot core
      ctx.shadowColor = '#ffffff';
      ctx.shadowBlur = 10;
      ctx.strokeStyle = 'rgba(255, 200, 200, 0.9)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      for (let i = 0; i < this.crackPoints.length; i++) {
        const p = this.crackPoints[i];
        const r = p.baseRadius + expansion * 0.95 + Math.sin(t * 15 + i) * 2;
        const x = this.centerX + Math.cos(p.angle) * r;
        const y = this.centerY + Math.sin(p.angle) * r;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.stroke();
    }

    // Lightning branches
    ctx.shadowBlur = 15;
    for (let l of this.lightning) {
      const alpha = l.life / l.maxLife;
      ctx.strokeStyle = `rgba(255, 200, 255, ${alpha})`;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(l.x, l.y);
      for (let s of l.segments) ctx.lineTo(s.x, s.y);
      ctx.stroke();
    }

    // Debris particles
    ctx.shadowBlur = 5;
    for (let d of this.debris) {
      const alpha = d.life;
      ctx.save();
      ctx.translate(d.x, d.y);
      ctx.rotate(d.angle);
      ctx.fillStyle = `rgba(255, ${50 + d.life * 100|0}, ${80 + d.life * 50|0}, ${alpha})`;
      ctx.fillRect(-d.size/2, -d.size/2, d.size, d.size);
      ctx.restore();
    }

    // Vignette darkening during collapse
    if (this.phase === 'collapsing') {
      const collapseT = (t - 1.2) / 0.8;
      const vigAlpha = collapseT * 0.95;
      const vig = ctx.createRadialGradient(
        this.centerX, this.centerY, expansion * 0.5,
        this.centerX, this.centerY, Math.max(W, H)
      );
      vig.addColorStop(0, 'transparent');
      vig.addColorStop(0.4, `rgba(3, 0, 1, ${vigAlpha * 0.3})`);
      vig.addColorStop(1, `rgba(3, 0, 1, ${vigAlpha})`);
      ctx.fillStyle = vig;
      ctx.fillRect(0, 0, W, H);
    }

    ctx.restore();
  }
}

const tear = new DimensionalTear();

// ============================================
// MAIN LOOP
// ============================================

let lastTime = performance.now();

function loop(now) {
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;
  const time = now / 1000;

  // Smooth mouse
  mouseSmooth.x += (mouse.x - mouseSmooth.x) * 0.1;
  mouseSmooth.y += (mouse.y - mouseSmooth.y) * 0.1;

  // Progress simulation
  if (phase === 'loading') {
    progress += dt * 8; // 0-100 in ~12.5 seconds
    if (progress >= 100) {
      progress = 100;
      phase = 'converging';
      phaseTimer = 0;
      statusText.textContent = 'DIMENSIONAL BREACH IMMINENT';
    }
  } else if (phase === 'converging') {
    phaseTimer += dt;
    // Rain converges to center
    for (let d of drops) {
      const dx = W/2 - d.x;
      const dy = H/2 - d.y;
      d.x += dx * 0.02 * dt * 60;
      d.y += dy * 0.02 * dt * 60;
      d.baseSpeed *= 1.01;
    }
    if (phaseTimer > 1.5) {
      phase = 'tearing';
      tear.start();
    }
  }

  // Update UI
  progressFill.style.width = progress + '%';
  percentText.textContent = Math.floor(progress) + '%';
  updateCounter();

  // Terminal logs
  for (let log of LOGS) {
    if (progress >= log.t && !shownLogs.has(log.t)) {
      shownLogs.add(log.t);
      const div = document.createElement('div');
      div.textContent = log.text;
      div.style.opacity = '0';
      div.style.transition = 'opacity 0.3s';
      terminal.appendChild(div);
      requestAnimationFrame(() => div.style.opacity = '1');
      if (terminal.children.length > 4) {
        terminal.removeChild(terminal.firstChild);
      }
    }
  }

  // Shake UI during convergence
  if (phase === 'converging') {
    const shake = (1 - phaseTimer / 1.5) * 3;
    document.getElementById('ui-layer').style.transform = 
      `translate(${(Math.random()-0.5)*shake}px, ${(Math.random()-0.5)*shake}px)`;
  }

  // Clear and draw matrix
  ctx.fillStyle = 'rgba(3, 0, 1, 0.25)';
  ctx.fillRect(0, 0, W, H);

  // Draw drops
  for (let d of drops) {
    const data = d.update(dt, time);
    d.draw(ctx, time, data);
  }

  // Update and draw tear
  tear.update(dt);
  tear.draw(ctx);

  // Scanline overlay
  ctx.fillStyle = 'rgba(255, 0, 51, 0.02)';
  for (let y = 0; y < H; y += 4) {
    ctx.fillRect(0, y, W, 1);
  }

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);

// Click to skip (for testing)
window.addEventListener('click', () => {
  if (phase === 'loading') progress = 99;
});
</script>
</body>
